<script>
    // Scroll Progress Bar & header shadow
    function updateProgressAndHeader() {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;
        const progressBar = document.getElementById("scroll-progress");
        if (progressBar) progressBar.style.width = scrolled + "%";
        
        const header = document.getElementById("main-header");
        if (header) {
            if (winScroll > 20) {
                header.classList.add("scrolled");
            } else {
                header.classList.remove("scrolled");
            }
        }
    }
    
    window.addEventListener("scroll", updateProgressAndHeader);
    window.addEventListener("resize", updateProgressAndHeader);
    updateProgressAndHeader();

    // Reveal Animations with Intersection Observer
    const revealElements = document.querySelectorAll('.reveal');
    const observerOptions = {
        threshold: 0.12,
        rootMargin: "0px 0px -20px 0px"
    };
    
    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('active');
                // Optional: unobserve after animation to reduce load
                revealObserver.unobserve(entry.target);
            }
        });
    }, observerOptions);
    
    revealElements.forEach(el => revealObserver.observe(el));
    
    // Smooth scroll for anchor links + offset for sticky header
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function(e) {
            const targetId = this.getAttribute('href');
            if (targetId === "#" || targetId === "") return;
            const targetElement = document.querySelector(targetId);
            if (targetElement) {
                e.preventDefault();
                const headerHeight = document.querySelector('header')?.offsetHeight || 80;
                const elementPosition = targetElement.getBoundingClientRect().top + window.scrollY;
                window.scrollTo({
                    top: elementPosition - headerHeight - 15,
                    behavior: "smooth"
                });
                // Update URL without jumping
                history.pushState(null, null, targetId);
            }
        });
    });

    // Minor fix: ensure hero reveal triggers immediately if visible
    if (revealElements.length) {
        const heroReveal = document.querySelector('.hero .reveal');
        if (heroReveal && heroReveal.getBoundingClientRect().top < window.innerHeight) {
            heroReveal.classList.add('active');
        }
    }
</script>
